<div id="login-view" style="display: none;">
    <div class="glass-card auth-container">
        <h2 style="text-align: center; margin-bottom: 30px;">Login to MessConnect</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="login-email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" required placeholder="Password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Sign In</button>
        </form>
        <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted);">
            Don't have an account? <a href="#" onclick="navigateTo('register')">Register here</a>
        </p>
    </div>
</div>

<div id="register-view" style="display: none;">
    <div class="glass-card auth-container" style="max-width: 600px;">
        <h2 style="text-align: center; margin-bottom: 30px;">Create Account</h2>
        <form id="register-form">
            <div class="form-group">
                <label>I am a...</label>
                <select id="reg-role" onchange="toggleVendorFields()">
                    <option value="CUSTOMER">Customer (Student/Professional)</option>
                    <option value="VENDOR">Vendor (Mess Owner)</option>
                </select>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" required placeholder="john@example.com">
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" required placeholder="Password">
            </div>
            <div id="vendor-fields" style="display: none;">
                <div class="form-group">
                    <label>Mess Name</label>
                    <input type="text" id="reg-mess-name" placeholder="Healthy Bites Mess">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="reg-description" rows="3" placeholder="Tell us about your mess service..."></textarea>
                </div>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="reg-phone" placeholder="+91 98765 43210">
            </div>
            <div class="form-group">
                <label>Address</label>
                <textarea id="reg-address" rows="2" placeholder="Full address of your residence or mess"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Create Account</button>
        </form>
    </div>
</div>
