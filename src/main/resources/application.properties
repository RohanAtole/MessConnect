# Server configuration
server.port=8080

# Database configuration (using H2 for quick start, switch to MySQL for production)
spring.datasource.url=jdbc:h2:mem:messconnectdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# spring.datasource.url=jdbc:mysql://localhost:3306/messconnect?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=password
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JPA configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# JWT configuration
messconnect.app.jwtSecret=messconnectSecretKeyForDemoPurposeOnlyNeedToChangeInProduction
messconnect.app.jwtExpirationMs=86400000

# File Upload configuration
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Static resources
spring.web.resources.static-locations=classpath:/static/

